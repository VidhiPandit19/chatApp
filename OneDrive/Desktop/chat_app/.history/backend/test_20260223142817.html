<!DOCTYPE html>
<html>
<head>
  <title>Socket Test</title>
</head>
<body>

<h2>Socket Test</h2>

<input id="userId" placeholder="Enter your user ID" />
<button onclick="registerUser()">Register</button>

<br><br>

<input id="message" placeholder="Type message" />
<input id="receiverId" placeholder="Receiver ID" />
<button onclick="sendMessage()">Send</button>

<ul id="messages"></ul>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

<script>
  const socket = io("http://localhost:5000");

  function registerUser() {
    const userId = document.getElementById("userId").value;
    socket.emit("register", userId);
    alert("Registered as User " + userId);
  }

  async function sendMessage() {
    const receiver = document.getElementById("receiverId").value;
    const message = document.getElementById("message").value;

    try {
      const response = await axios.post(
        "http://localhost:5000/send",
        {
          receiver_Id: receiver,
          message: message
        },
        {
          headers: {
            Authorization: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6MSwiZW1haWwiOiJoYXJtaXRAZ21haWwuY29tIiwiaWF0IjoxNzcxODM2OTgyLCJleHAiOjE3NzE4NDA1ODJ9.qkZ9TavrGTdmSE3DRmCosbQuYVRmI1ZP2v4MYqOZRxQ"
          }
        }
      );

      console.log("Message saved:", response.data);

    } catch (error) {
      console.error("Error:", error.response?.data || error.message);
    }
  }

  socket.on("receiveMessage", (data) => {
    const li = document.createElement("li");
    li.innerText = data.sender_Id + ": " + data.message;
    document.getElementById("messages").appendChild(li);
  });
</script>

</body>
</html>
